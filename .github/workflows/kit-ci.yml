name: kit-ci

on:
  push:
    branches: [main, grok]
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Make scripts executable
        run: chmod +x scripts/check-docs scripts/verify scripts/test scripts/list-skills scripts/bootstrap-project scripts/smoke-level-b

      - name: check-docs
        run: ./scripts/check-docs

      - name: verify
        run: ./scripts/verify

      - name: list-skills
        run: ./scripts/list-skills --paths | wc -l

      - name: test (allow not configured)
        run: ./scripts/test

      - name: Level B smoke
        run: ./scripts/smoke-level-b
